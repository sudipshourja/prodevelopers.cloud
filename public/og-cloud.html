<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #0a0a0a; /* neutral-950 */
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    color: #fafafa; /* neutral-50 */
    overflow: hidden;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .icon {
    width: 80px;
    height: 80px;
    stroke: #a855f7; /* purple-500 */
    fill: none;
    stroke-width: 2;
  }
  .brand {
    font-size: 100px;
    font-weight: 500;
    letter-spacing: -0.05em; /* tracking-tight */
    line-height: 1;
  }
  .tld {
    color: #737373; /* neutral-500 */
  }
</style>
</head>
<body>
  <div class="logo">
    <svg class="icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
      <rect x="9" y="9" width="6" height="6"></rect>
      <line x1="9" y1="1" x2="9" y2="4"></line>
      <line x1="15" y1="1" x2="15" y2="4"></line>
      <line x1="9" y1="20" x2="9" y2="23"></line>
      <line x1="15" y1="20" x2="15" y2="23"></line>
      <line x1="20" y1="9" x2="23" y2="9"></line>
      <line x1="20" y1="15" x2="23" y2="15"></line>
      <line x1="1" y1="9" x2="4" y2="9"></line>
      <line x1="1" y1="15" x2="4" y2="15"></line>
    </svg>
    <div class="brand">prodevelopers<span class="tld">.cloud</span></div>
  </div>
</body>
</html>
